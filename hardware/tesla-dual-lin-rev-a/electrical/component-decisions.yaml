      path: C:/Users/ezabz/AppData/Local/Programs/KiCad/10.0/share/kicad/symbols/Interface_CAN_LIN.kicad_sym
      finding: SOIC-8 symbol maps RXD=1, SLP_N=2, WAKE_N=3, TXD=4, GND=5, LIN=6, VBAT=7, INH=8.
