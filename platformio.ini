[platformio]
default_envs = field_passive

[env]
platform = espressif32@6.9.0
board = seeed_xiao_esp32c3
framework = arduino
; Upload: always use esptool directly with --no-stub (stub upload fails on this board)
; See README.md for the full esptool command
upload_protocol = esptool
upload_speed = 115200
monitor_speed = 115200
monitor_dtr = 1   ; required for USB CDC output on Windows
monitor_rts = 0
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=3
  -DCONFIG_UART_ISR_IN_IRAM=1

[env:field_passive]
build_flags =
  ${env.build_flags}
  -DBUILD_PROFILE=\"field_passive\"
  -DFIRMWARE_VERSION=\"v5.1\"

[env:field_passive_nowifi]
build_flags =
  ${env.build_flags}
  -DBUILD_PROFILE=\"field_passive_nowifi\"
  -DFIRMWARE_VERSION=\"v5.1\"
  -DNO_WIFI

[env:bench_active_ble]
build_flags =
  ${env.build_flags}
  -DBUILD_PROFILE=\"bench_active_ble\"
  -DFIRMWARE_VERSION=\"v5.1\"
  -DACTIVE_MODE
  -DNO_WIFI
lib_deps =
  h2zero/NimBLE-Arduino @ ^2.2.0

[env:chip_lab_active]
build_flags =
  ${env.build_flags}
  -DBUILD_PROFILE=\"chip_lab_active\"
  -DFIRMWARE_VERSION=\"v5.1\"
  -DACTIVE_MODE
  -DCHIP_LAB_ACTIVE
  -DNO_WIFI
lib_deps =
  h2zero/NimBLE-Arduino @ ^2.2.0

[env:car_passthrough]
build_flags =
  ${env.build_flags}
  -DBUILD_PROFILE=\"car_passthrough\"
  -DFIRMWARE_VERSION=\"v5.2-passthrough\"
  -DPASSTHROUGH_MODE
  -DNO_WIFI

; Compatibility alias for older docs/scripts. Prefer bench_active_ble for new work.
[env:xiao_esp32c3]
build_flags =
  ${env.build_flags}
  -DBUILD_PROFILE=\"xiao_esp32c3_legacy_active\"
  -DFIRMWARE_VERSION=\"v5.1\"
  -DACTIVE_MODE
  -DNO_WIFI
lib_deps =
  h2zero/NimBLE-Arduino @ ^2.2.0
